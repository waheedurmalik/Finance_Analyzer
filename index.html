const OD_FILE   = "ledger-data.json";
const OD_SCOPE  = ["Files.ReadWrite.AppFolder", "User.Read"];

// Load MSAL dynamically
function loadMSAL() {
  return new Promise((resolve, reject) => {
    if (window.msal) { resolve(window.msal); return; }
    const s = document.createElement("script");
    s.src = "https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js";
    s.onload  = () => resolve(window.msal);
    s.onerror = () => reject(new Error("Failed to load MSAL"));
    document.head.appendChild(s);
  });
}

function getMSALApp(clientId) {
  if (!clientId) return null;
  if (window.__msalApp) return window.__msalApp;
  const cfg = {
    auth: { clientId, redirectUri: window.location.origin + window.location.pathname },
    cache: { cacheLocation: "localStorage" },
  };
  window.__msalApp = new window.msal.PublicClientApplication(cfg);
  return window.__msalApp;
}

async function getToken(clientId, interactive = false) {
  const msal = await loadMSAL();
  const app  = getMSALApp(clientId);
  if (!app) throw new Error("No client ID");
  await app.initialize();
  const accounts = app.getAllAccounts();
  const req = { scopes: OD_SCOPE, account: accounts[0] };
  try {
    const r = await app.acquireTokenSilent(req);
    return r.accessToken;
  } catch {
    if (!interactive) throw new Error("silent_fail");
    const r = await app.acquireTokenPopup({ scopes: OD_SCOPE });
    return r.accessToken;
  }
}

async function odRead(token) {
  const res = await fetch(
    "https://graph.microsoft.com/v1.0/me/drive/special/approot:/" + OD_FILE + ":/content",
    { headers: { Authorization: "Bearer " + token } }
  );
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("Read failed: " + res.status);
  return await res.json();
}

async function odWrite(token, data) {
  const body = JSON.stringify(data);
  const res = await fetch(
    "https://graph.microsoft.com/v1.0/me/drive/special/approot:/" + OD_FILE + ":/content",
    { method: "PUT", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" }, body }
  );
  if (!res.ok) throw new Error("Write failed: " + res.status);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt  = (n, cur="AED") => cur+" "+Math.abs(Number(n||0)).toLocaleString("en-AE",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtM = m => { if(!m)return""; const[y,mo]=m.split("-"); return new Date(y,+mo-1).toLocaleDateString("en-GB",{month:"short",year:"2-digit"}); };
const fmtD = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : "";
const weekKey = d => {
  if(!d) return "";
  const dt=new Date(d); const jan1=new Date(dt.getFullYear(),0,1);
  const wk=Math.ceil(((dt-jan1)/864e5+jan1.getDay()+1)/7);
  return dt.getFullYear()+"-W"+String(wk).padStart(2,"0");
};

// txType: "standard" | "nonstandard" | "exceptional"
function getTxType(tx) {
  if(tx.txType) return tx.txType;
  if(tx.isStandard===false) return "exceptional";
  return "standard";
}

function getSub(desc, cat, tax) {
  const subs=tax[cat]?.subs; if(!subs) return "Other";
  const d=(desc||"").toLowerCase();
  for(const [name,s] of Object.entries(subs)) {
    if((s.kw||[]).some(k => k&&d.includes(k))) return name;
  }
  return Object.keys(subs).at(-1)||"Other";
}
function enrich(tx, tax, vmap) {
  const key=(tx.description||"").toLowerCase().trim();
  const vm=vmap[key];
  const cat=vm?.category||tx.category||"Other";
  const sub=vm?.subcategory||getSub(tx.description,cat,tax);
  const txType=vm?.txType||tx.txType||getTxType(tx);
  return {...tx, category:cat, subcategory:sub, txType, month:tx.date?.substring(0,7)||"Unknown"};
}

// ─── Excel Export ─────────────────────────────────────────────────────────────
function doExport(txs,tax,cur) {
  const wb=XLSX.utils.book_new();
  const txHeader=["Date","Description","Category","Subcategory","Type","Amount ("+cur+")"];
  const txData=txs.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(t=>[
    t.date,t.description,t.category,t.subcategory,TYPE_META[t.txType]?.full||t.txType,t.amount
  ]);
  const wsTx=XLSX.utils.aoa_to_sheet([txHeader,...txData]);
  wsTx["!cols"]=[{wch:12},{wch:32},{wch:18},{wch:22},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsTx,"Transactions");
  const months=[...new Set(txs.map(t=>t.month))].sort();
  const cats=[...new Set(txs.map(t=>t.category))].sort();
  const catSheet=[["Month",...cats,"Total"]];
  months.forEach(m=>{
    const mt=txs.filter(t=>t.month===m);
    const row=[fmtM(m),...cats.map(c=>mt.filter(t=>t.category===c).reduce((s,t)=>s+t.amount,0))];
    row.push(row.slice(1).reduce((a,b)=>a+b,0));
    catSheet.push(row);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(catSheet),"By Category");
  const subs=[...new Set(txs.map(t=>t.subcategory))].sort();
  const subSheet=[["Month",...subs,"Total"]];
  months.forEach(m=>{
    const mt=txs.filter(t=>t.month===m);
    const row=[fmtM(m),...subs.map(s=>mt.filter(t=>t.subcategory===s).reduce((a,t)=>a+t.amount,0))];
    row.push(row.slice(1).reduce((a,b)=>a+b,0));
    subSheet.push(row);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(subSheet),"By Subcategory");
  const b64=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
  const uri="data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+b64;
  const a=document.createElement("a"); a.href=uri; a.download="ledger_export.xlsx"; a.style.display="none";
  document.body.appendChild(a); a.click(); setTimeout(()=>document.body.removeChild(a),2000);
}

function ManageModal({taxonomy,setTaxonomy,vendorMap,setVendorMap,onClose}) {
  const [view,setView]=useState("list");
  const [selCat,setSelCat]=useState(null);
  const [selSub,setSelSub]=useState(null);
  const [nameV,setNameV]=useState("");
  const [iconV,setIconV]=useState("📦");
  const [colorV,setColorV]=useState("#8a9a8a");
  const [moveV,setMoveV]=useState("");
  const [err,setErr]=useState("");
  const [confirmDel,setConfirmDel]=useState(null);

  const go=(v,cat=null,sub=null,name="",icon="📦",color="#8a9a8a")=>{
    setView(v);setSelCat(cat);setSelSub(sub);setNameV(name);setIconV(icon);setColorV(color);setErr("");setConfirmDel(null);
  };

  function syncVmap(oldCat,newCat,oldSub,newSub) {
    setVendorMap(v=>{
      const u={};
      for(const[k,vm] of Object.entries(v)) u[k]={
        category:(vm.category===oldCat&&newCat)?newCat:vm.category,
        subcategory:(vm.subcategory===oldSub&&vm.category===oldCat&&newSub)?newSub:vm.subcategory,
      };
      return u;
    });
  }

  // Reorder helpers
  function moveCat(cat,dir) {
    setTaxonomy(t=>{
      const keys=Object.keys(t); const i=keys.indexOf(cat); const j=i+dir;
      if(j<0||j>=keys.length) return t;
      [keys[i],keys[j]]=[keys[j],keys[i]];
      const u={}; keys.forEach(k=>u[k]=t[k]); return u;
    });
  }
  function moveSub2(cat,sub,dir) {
    setTaxonomy(t=>{
      const keys=Object.keys(t[cat].subs); const i=keys.indexOf(sub); const j=i+dir;
      if(j<0||j>=keys.length) return t;
      [keys[i],keys[j]]=[keys[j],keys[i]];
      const s={}; keys.forEach(k=>s[k]=t[cat].subs[k]);
      return {...t,[cat]:{...t[cat],subs:s}};
    });
  }

  function addCat() {
    const n=nameV.trim(); if(!n){setErr("Enter a name.");return;} if(taxonomy[n]){setErr("Already exists.");return;}
    setTaxonomy(t=>({...t,[n]:{icon:iconV,color:colorV,subs:{["Other "+n]:{icon:iconV,kw:[]}}}})); go("list");
  }
  function addSub() {
    const n=nameV.trim(); if(!n){setErr("Enter a name.");return;} if(taxonomy[selCat]?.subs[n]){setErr("Already exists.");return;}
    setTaxonomy(t=>({...t,[selCat]:{...t[selCat],subs:{...t[selCat].subs,[n]:{icon:iconV,kw:[]}}}})); go("list");
  }
  function editCat() {
    const n=nameV.trim(); if(!n){setErr("Enter a name.");return;}
    setTaxonomy(t=>{
      const u={};
      for(const[k,v] of Object.entries(t)) {
        if(k===selCat) u[n]={...v,icon:iconV,color:colorV};
        else u[k]=v;
      }
      return u;
    });
    if(n!==selCat) syncVmap(selCat,n,null,null);
    go("list");
  }
  function editSub() {
    const n=nameV.trim(); if(!n){setErr("Enter a name.");return;}
    setTaxonomy(t=>{
      const s={};
      for(const[k,v] of Object.entries(t[selCat].subs)) s[k===selSub?n:k]=(k===selSub?{...v,icon:iconV}:v);
      return {...t,[selCat]:{...t[selCat],subs:s}};
    });
    if(n!==selSub) syncVmap(selCat,selCat,selSub,n);
    go("list");
  }
  function moveSub() {
    if(!moveV||moveV===selCat){setErr("Pick a different category.");return;}
    const def=taxonomy[selCat].subs[selSub];
    setTaxonomy(t=>{const s={...t[selCat].subs}; delete s[selSub]; return {...t,[selCat]:{...t[selCat],subs:s},[moveV]:{...t[moveV],subs:{...t[moveV].subs,[selSub]:def}}};});
    syncVmap(selCat,moveV,selSub,selSub); go("list");
  }
  function doDelCat(cat) {
    setTaxonomy(t=>{const u={...t}; delete u[cat]; return u;});
    setVendorMap(v=>{const u={}; for(const[k,vm] of Object.entries(v)) if(vm.category!==cat) u[k]=vm; return u;});
    setConfirmDel(null);
  }
  function doDelSub(cat,sub) {
    setTaxonomy(t=>{const s={...t[cat].subs}; delete s[sub]; return {...t,[cat]:{...t[cat],subs:s}};});
    setVendorMap(v=>{const u={}; for(const[k,vm] of Object.entries(v)) if(!(vm.category===cat&&vm.subcategory===sub)) u[k]=vm; return u;});
    setConfirmDel(null);
  }

  const catKeys=Object.keys(taxonomy);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,15,14,0.96)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{position:"relative",background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:28,maxWidth:560,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>

        {confirmDel&&(

              <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.5}}>
                {confirmDel.type==="cat"
                  ?<span>Delete <strong style={{color:C.text}}>{confirmDel.cat}</strong> and all subcategories?</span>
                  :<span>Delete <strong style={{color:C.text}}>{confirmDel.sub}</strong>?</span>}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setConfirmDel(null)} style={{...btn(C.s3,C.muted,`1px solid ${C.border}`,13,"11px 0"),flex:1}}>Cancel</button>
                <button onClick={()=>confirmDel.type==="cat"?doDelCat(confirmDel.cat):doDelSub(confirmDel.cat,confirmDel.sub)} style={{...btn(C.danger,"#0d0f0e","none",13,"11px 0"),flex:1}}>Delete</button>
              </div>
            </div>
          </div>
        )}

        {view==="list"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:20}}>Manage Categories</span>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>go("addCat")} style={btn(C.accent,"#0d0f0e","none",12,"7px 14px")}>+ Category</button>
                <button onClick={onClose} style={btn(C.s2,C.muted,`1px solid ${C.border}`,12,"7px 14px")}>Done</button>
              </div>
            </div>
            {catKeys.map((cat,ci)=>{
              const catDef=taxonomy[cat];
              const subKeys=Object.keys(catDef.subs);
              return (
                <div key={cat} style={{marginBottom:10,background:C.s2,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>

                        <button onClick={()=>moveCat(cat,1)} disabled={ci===catKeys.length-1} style={{background:"none",border:"none",color:ci===catKeys.length-1?C.dim:C.muted,cursor:ci===catKeys.length-1?"default":"pointer",fontSize:10,padding:"0 3px",lineHeight:1}}>▼</button>

// ─── Import Modal (AI-powered — screenshot + text) ───────────────────────────
function ImportModal({onImport,onClose}) {
  const [apiKey,setApiKey]   = useState(()=>{try{return localStorage.getItem("ledger-apikey")||"";}catch{return "";}});
  const [status,setStatus]   = useState("idle");
  const [err,setErr]         = useState("");
  const [preview,setPreview] = useState(null);
  const [showKey,setShowKey] = useState(false);
  const [images,setImages]   = useState([]);
  const [text,setText]       = useState("");

  function saveKey(k){ setApiKey(k); try{k?localStorage.setItem("ledger-apikey",k):localStorage.removeItem("ledger-apikey");}catch{} }

  function stripFences(s){ return s.replace(/`{3}json|`{3}/g,"").trim(); }

  function addImageFromFile(file) {
    if(!file||!file.type.startsWith("image/")) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const dataUrl=ev.target.result;
      const base64=dataUrl.split(",")[1];
      setImages(prev=>[...prev,{dataUrl,base64,mediaType:file.type||"image/png"}]);
      setErr(""); setStatus("idle"); setPreview(null);
    };
    reader.readAsDataURL(file);
  }

  function handlePaste(e) {
    const items=Array.from(e.clipboardData?.items||[]);
    const imgItem=items.find(it=>it.type.startsWith("image/"));
    if(imgItem){ e.preventDefault(); addImageFromFile(imgItem.getAsFile()); }
  }

  function handleFileDrop(e) {
    e.preventDefault();
    Array.from(e.dataTransfer.files||[]).forEach(addImageFromFile);
  }

  function removeImage(i){ setImages(prev=>prev.filter((_,idx)=>idx!==i)); }

  async function runAI() {
    if(!apiKey.trim()){ setErr("Enter your Anthropic API key first."); return; }
    const domText = document.querySelector("#ledger-stmt-input")?.value||"";
    const effectiveText=(text||domText).trim();
    if(!images.length&&!effectiveText){ setErr("Paste a screenshot or statement text first."); return; }
    setErr(""); setStatus("loading"); setPreview(null);

    const systemPrompt="You are a bank statement parser. Extract ALL debit/expense transactions. Return ONLY a valid JSON array with no markdown, no explanation. Each object: {\"date\":\"YYYY-MM-DD\",\"description\":\"clean merchant name\",\"amount\":number}. Strip prefixes like IAP-, NFC-, AP-PAY-, card numbers, city/country. Exclude credits and incoming transfers. Use leftmost date column if two exist.";

    const userContent=[];
    images.forEach(img=>userContent.push({type:"image",source:{type:"base64",media_type:img.mediaType,data:img.base64}}));
    userContent.push({type:"text",text:images.length?"Parse all transactions from the screenshot(s)"+(effectiveText?" and this text:\n\n"+effectiveText:"."): "Parse this bank statement:\n\n"+effectiveText});

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4096,system:systemPrompt,messages:[{role:"user",content:userContent}]})
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error "+res.status);}
      const data=await res.json();
      const raw=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=stripFences(raw);
      let parsed;
      try{parsed=JSON.parse(clean);}
      catch{
        const m=clean.match(/\[[\s\S]*\]/);
        if(!m) throw new Error("Could not parse AI response as JSON");
        parsed=JSON.parse(m[0]);
      }
      if(!Array.isArray(parsed)||!parsed.length) throw new Error("No transactions found");
      setPreview(parsed); setStatus("done");
    }catch(e){
      setErr(e.message||"Unknown error"); setStatus("error");
    }
  }

  function goJSON(){
    setErr("");
    const raw=stripFences((text||document.querySelector("#ledger-stmt-input")?.value||"").trim());
    if(!raw){setErr("Paste JSON first.");return;}
    let p;
    try{p=JSON.parse(raw);}
    catch{
      const m=raw.match(/\[[\s\S]*\]/);
      if(m){try{p=JSON.parse(m[0]);}catch{setErr("Invalid JSON.");return;}}
      else{setErr("Invalid JSON.");return;}
    }
    if(!Array.isArray(p)||!p.length){setErr("No transactions found.");return;}
    onImport(p);
  }

  const hasInput = images.length>0 || text.trim().length>0;

  return (
    <div onPaste={handlePaste} style={{position:"fixed",inset:0,background:"rgba(13,15,14,0.96)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>

            <button onClick={()=>setShowKey(v=>!v)} style={btn(C.s2,C.muted,`1px solid ${C.border}`,12,"9px 12px")}>{showKey?"Hide":"Show"}</button>
          </div>
          {!apiKey&&<div style={{fontSize:11,color:C.dim,marginTop:5}}>Get a free key at <span style={{color:C.accent}}>platform.anthropic.com</span> → API Keys</div>}
          {apiKey&&<div style={{fontSize:11,color:"#76f5d4",marginTop:5}}>✓ Key saved locally on this device</div>}
        </div>

        {/* Screenshot paste zone */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontFamily:"monospace",color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Screenshots &nbsp;<span style={{color:C.accent}}>Ctrl+V to paste</span></div>
          <div

          >
            {images.length===0&&(

            {images.map((img,i)=>(

                <button onClick={()=>removeImage(i)} style={{position:"absolute",top:-7,right:-7,width:20,height:20,borderRadius:"50%",background:C.danger,border:"none",color:"#fff",fontSize:13,cursor:"pointer",lineHeight:1,fontWeight:700}}>×</button>

// ─── Save / Load Modal ────────────────────────────────────────────────────────
function SettingsModal({taxonomy,vendorMap,rawTxs,currency,onImport,onClose}) {
  const [err,setErr]     = useState("");
  const [status,setStatus] = useState("idle"); // idle|saved|loaded|error
  const [msg,setMsg]     = useState("");
  const fileRef          = React.useRef(null);
  const hasNativeFS      = typeof window !== "undefined" && "showSaveFilePicker" in window;

  function buildPayload() {
    return {version:1,savedAt:new Date().toISOString(),taxonomy,vendorMap,rawTxs,currency};
  }

  // ── Native File System API (Chrome/Edge on desktop) ──
  async function saveNative() {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName:"ledger-data.json",
        types:[{description:"JSON",accept:{"application/json":[".json"]}}]
      });
      const writable = await handle.createWritable();
      await writable.write(JSON.stringify(buildPayload(),null,2));
      await writable.close();
      // Remember handle for next time (within session)
      window.__ledgerFileHandle = handle;
      setStatus("saved"); setMsg("Saved to "+handle.name);
    } catch(e) {
      if(e.name!=="AbortError"){ setErr(e.message); setStatus("error"); }
    }
  }

  async function saveToLastFile() {
    if(!window.__ledgerFileHandle) { saveNative(); return; }
    try {
      const writable = await window.__ledgerFileHandle.createWritable();
      await writable.write(JSON.stringify(buildPayload(),null,2));
      await writable.close();
      setStatus("saved"); setMsg("Saved · "+new Date().toLocaleTimeString());
    } catch { saveNative(); }
  }

  // ── Fallback download (Safari / Firefox / in-app) ──
  function saveDownload() {
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(buildPayload(),null,2))));
    const a=document.createElement("a"); a.href="data:application/json;base64,"+b64;
    a.download="ledger-data.json"; a.style.display="none";
    document.body.appendChild(a); a.click(); setTimeout(()=>document.body.removeChild(a),2000);
    setStatus("saved"); setMsg("Downloaded ledger-data.json");
  }

  function handleFileLoad(e) {
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      setErr("");
      let p;
      try{p=JSON.parse(ev.target.result);}catch{setErr("Not valid JSON.");return;}
      if(!p.taxonomy||!p.rawTxs){setErr("Not a valid ledger-data.json file.");return;}
      onImport(p); setStatus("loaded"); setMsg("Loaded "+p.rawTxs.length+" transactions");
    };
    reader.onerror=()=>setErr("Could not read file.");
    reader.readAsText(file);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,15,14,0.96)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:28,maxWidth:480,width:"100%"}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:20,marginBottom:4}}>Save & Load Data</div>
        <div style={{fontSize:13,color:C.dim,marginBottom:20,lineHeight:1.6}}>
          Keep <span style={{color:C.accent,fontFamily:"monospace"}}>ledger-data.json</span> in your OneDrive or iCloud folder — it syncs automatically between your devices. Just save here after changes and load on your other device.
        </div>

        {/* Stats */}
        <div style={{background:C.s2,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",gap:20,fontSize:13,color:C.muted}}>
          <span>📁 {rawTxs.length} transactions</span>
          <span>🗂 {Object.keys(taxonomy).length} categories</span>
          <span>🔗 {Object.keys(vendorMap).length} mappings</span>
        </div>

        {/* Status message */}
        {status==="saved"&&<div style={{color:"#76f5d4",fontSize:13,marginBottom:14,padding:"8px 12px",background:"rgba(118,245,212,0.08)",borderRadius:8}}>✓ {msg}</div>}
        {status==="loaded"&&<div style={{color:"#76f5d4",fontSize:13,marginBottom:14,padding:"8px 12px",background:"rgba(118,245,212,0.08)",borderRadius:8}}>✓ {msg}</div>}
        {(status==="error"||err)&&<div style={{color:C.danger,fontSize:13,marginBottom:14,padding:"8px 12px",background:"rgba(245,118,118,0.08)",borderRadius:8}}>{err||msg}</div>}

        {/* Save section */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontFamily:"monospace",color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Save</div>
          <div style={{display:"flex",gap:8}}>
            {hasNativeFS ? (
              <>
                <button onClick={saveToLastFile} style={{...btn(C.accent,"#0d0f0e","none",13,"11px 0"),flex:2}}>
                  💾 {window.__ledgerFileHandle?"Save to same file":"Save file…"}
                </button>
                {window.__ledgerFileHandle&&(
                  <button onClick={saveNative} style={{...btn(C.s2,C.muted,`1px solid ${C.border}`,12,"11px 12px"),flex:1}}>
                    Save as…
                  </button>
                )}
              </>
            ) : (
              <button onClick={saveDownload} style={{...btn(C.accent,"#0d0f0e","none",13,"11px 0"),flex:1}}>
                📥 Download ledger-data.json
              </button>
            )}
          </div>
          {hasNativeFS&&<div style={{fontSize:11,color:C.dim,marginTop:6}}>Tip: save it directly into your OneDrive or iCloud Drive folder</div>}
          {!hasNativeFS&&<div style={{fontSize:11,color:"#f5d476",marginTop:6}}>⚠ Folder picker only works when running ledger.html directly in Chrome/Edge — not inside Claude. Download the file then open it from your desktop.</div>}
        </div>

        {/* Load section */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontFamily:"monospace",color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Load</div>
          <input ref={fileRef} type="file" accept=".json,application/json" onChange={handleFileLoad} style={{display:"none"}} id="sync-load-input"/>
          <label htmlFor="sync-load-input" style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,border:`2px dashed ${C.border}`,background:C.bg,cursor:"pointer",boxSizing:"border-box"}}>
            <span style={{fontSize:26}}>📂</span>
            <div>
              <div style={{fontWeight:600,color:C.text,fontSize:13}}>Select ledger-data.json</div>
              <div style={{fontSize:11,color:C.dim,marginTop:2}}>Browse to your OneDrive / iCloud Drive folder</div>
            </div>
          </label>
        </div>

        <button onClick={onClose} style={{...btn(C.s2,C.muted,`1px solid ${C.border}`,13,"11px 0"),width:"100%"}}>Close</button>
      </div>
    </div>
  );
}

// ─── Date Range helpers ──────────────────────────────────────────────────────
// ─── Date range helper ───────────────────────────────────────────────────────
function resolvePeriod(preset, customFrom, customTo) {
  const today = new Date();
  const toISO = d => { const r=new Date(d); return r.toISOString().slice(0,10); };
  const startOf = (d, unit) => {
    const r=new Date(d);
    if(unit==="week"){ const day=r.getDay()||7; r.setDate(r.getDate()-day+1); }
    else if(unit==="month") r.setDate(1);
    else if(unit==="year"){ r.setMonth(0); r.setDate(1); }
    r.setHours(0,0,0,0); return r;
  };
  const t = new Date(today);
  if(preset==="this_week")  return { from:toISO(startOf(t,"week")), to:toISO(t) };
  if(preset==="last_week")  { const s=startOf(t,"week"); s.setDate(s.getDate()-7); const e=new Date(s); e.setDate(e.getDate()+6); return {from:toISO(s),to:toISO(e)}; }
  if(preset==="this_month") return { from:toISO(startOf(t,"month")), to:toISO(t) };
  if(preset==="last_month") { const s=startOf(t,"month"); s.setMonth(s.getMonth()-1); const e=new Date(s); e.setMonth(e.getMonth()+1); e.setDate(0); return {from:toISO(s),to:toISO(e)}; }
  if(preset==="this_year")  return { from:toISO(startOf(t,"year")), to:toISO(t) };
  if(preset==="last_year")  { const s=startOf(t,"year"); s.setFullYear(s.getFullYear()-1); const e=new Date(s); e.setFullYear(e.getFullYear()+1); e.setDate(e.getDate()-1); return {from:toISO(s),to:toISO(e)}; }
  return { from: customFrom||"2000-01-01", to: customTo||toISO(t) };
}

const PERIOD_PRESETS = [
  ["this_week","This Week"],["last_week","Last Week"],
  ["this_month","This Month"],["last_month","Last Month"],
  ["this_year","This Year"],["last_year","Last Year"],["custom","Custom"],
];

function PeriodPicker({label, preset, setPreset, customFrom, setCustomFrom, customTo, setCustomTo, color}) {
  const {from,to} = resolvePeriod(preset, customFrom, customTo);

// ─── Spending Bar Chart (two periods, one bar per cat/sub) ────────────────────
function SpendingChart({transactions,taxonomy,currency,onDrillTxs}) {
  const [mode,setMode]             = useState("categories");
  const [typeFilter,setTypeFilter] = useState(["standard","nonstandard","exceptional"]);
  const [showB,setShowB]           = useState(false);

  // Period A
  const [presetA,setPresetA]       = useState("this_month");
  const [cfA,setCfA]               = useState("");
  const [ctA,setCtA]               = useState("");
  // Period B
  const [presetB,setPresetB]       = useState("last_month");
  const [cfB,setCfB]               = useState("");
  const [ctB,setCtB]               = useState("");

  const {from:fromA, to:toA} = useMemo(()=>resolvePeriod(presetA,cfA,ctA),[presetA,cfA,ctA]);
  const {from:fromB, to:toB} = useMemo(()=>resolvePeriod(presetB,cfB,ctB),[presetB,cfB,ctB]);

  const txA = useMemo(()=>transactions.filter(t=>t.date>=fromA&&t.date<=toA&&typeFilter.includes(t.txType)),[transactions,fromA,toA,typeFilter]);
  const txB = useMemo(()=>transactions.filter(t=>t.date>=fromB&&t.date<=toB&&typeFilter.includes(t.txType)),[transactions,fromB,toB,typeFilter]);

  const chartData = useMemo(()=>{
    const sk = mode==="categories"?"category":"subcategory";
    const keys = [...new Set([...txA,...txB].map(t=>t[sk]))];
    const totsA={}, totsB={};
    txA.forEach(t=>{totsA[t[sk]]=(totsA[t[sk]]||0)+t.amount;});
    txB.forEach(t=>{totsB[t[sk]]=(totsB[t[sk]]||0)+t.amount;});
    return keys
      .map(k=>({key:k, A:totsA[k]||0, B:totsB[k]||0}))
      .sort((a,b)=>(b.A+b.B)-(a.A+a.B));
  },[txA,txB,mode]);

  const colorOf = k => {
    if(mode==="categories") return taxonomy[k]?.color||PAL[chartData.findIndex(r=>r.key===k)%PAL.length];
    for(const[,d] of Object.entries(taxonomy)) if(d.subs[k]) return d.color;
    return PAL[chartData.findIndex(r=>r.key===k)%PAL.length];
  };

  const labelA = useMemo(()=>PERIOD_PRESETS.find(([v])=>v===presetA)?.[1]||"Period A",[presetA]);
  const labelB = useMemo(()=>PERIOD_PRESETS.find(([v])=>v===presetB)?.[1]||"Period B",[presetB]);

  function handleClick(entry, period) {
    if(!entry) return;
    const txs = (period==="A"?txA:txB).filter(t=>(mode==="categories"?t.category:t.subcategory)===entry.key);
    if(txs.length) onDrillTxs(txs, entry.key+" · "+(period==="A"?labelA:labelB));
  }

  // Custom tooltip
  function BarTT({active,payload,label}) {
    if(!active||!payload?.length) return null;
    const col = colorOf(label);
    return (
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:12,minWidth:160}}>
        <div style={{fontWeight:700,color:col,marginBottom:6}}>{label}</div>
        {payload.map((p,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",gap:16,marginBottom:2,color:C.muted}}>
            <span style={{color:p.fill}}>{p.name}</span>
            <span style={{fontFamily:"monospace",color:C.text}}>{fmt(p.value,currency)}</span>
          </div>
        ))}
        {payload.length===2&&payload[1].value>0&&(
          <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.dim}}>
            {payload[0].value>payload[1].value
              ? <span style={{color:"#f57676"}}>▲ {((payload[0].value/payload[1].value-1)*100).toFixed(0)}% vs {labelB}</span>
              : <span style={{color:"#76f5d4"}}>▼ {((1-payload[0].value/payload[1].value)*100).toFixed(0)}% vs {labelB}</span>
            }
          </div>
        )}
      </div>
    );
  }

  const barHeight = showB ? 52 : 34;

  return (
    <div style={card}>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:17}}>Spending by {mode==="categories"?"Category":"Subcategory"}</div>
        <Pill options={[["categories","Categories"],["subcategories","Subcategories"]]} value={mode} onChange={setMode}/>
      </div>

      {/* Period pickers */}
      <div style={{display:"grid",gridTemplateColumns:showB?"1fr 1fr":"1fr",gap:10,marginBottom:12}}>
        <PeriodPicker label="Period A" preset={presetA} setPreset={setPresetA} customFrom={cfA} setCustomFrom={setCfA} customTo={ctA} setCustomTo={setCtA} color={C.accent}/>
        {showB && <PeriodPicker label="Period B" preset={presetB} setPreset={setPresetB} customFrom={cfB} setCustomFrom={setCfB} customTo={ctB} setCustomTo={setCtB} color="#a78bfa"/>}
      </div>
      <button onClick={()=>setShowB(v=>!v)} style={{...btn(showB?"rgba(167,139,250,0.15)":C.s2, showB?"#a78bfa":C.muted, `1px solid ${showB?"#a78bfa44":C.border}`, 11, "5px 12px"),marginBottom:14}}>
        {showB?"✕ Remove Period B":"+ Compare Period B"}
      </button>

      {/* Type filters */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {Object.entries(TYPE_META).map(([v,m])=>(
          <button key={v} onClick={()=>setTypeFilter(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${typeFilter.includes(v)?m.color:C.border}`,background:typeFilter.includes(v)?m.color+"18":"transparent",color:typeFilter.includes(v)?m.color:C.dim,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:typeFilter.includes(v)?600:400}}>
            {typeFilter.includes(v)?"●":"○"} {m.full}
          </button>
        ))}
      </div>

      {/* Legend when comparing */}
      {showB&&(
        <div style={{display:"flex",gap:16,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.muted}}>
            <div style={{width:12,height:12,borderRadius:3,background:C.accent}}/>{labelA}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.muted}}>
            <div style={{width:12,height:12,borderRadius:3,background:"#a78bfa"}}/>{labelB}
          </div>
        </div>
      )}

      {chartData.length===0
        ? <div style={{padding:40,textAlign:"center",color:C.dim,fontSize:13}}>No data for this period</div>
        : <ResponsiveContainer width="100%" height={Math.max(220, chartData.length*barHeight+40)}>
            <BarChart data={chartData} layout="vertical" margin={{top:4,right:70,left:4,bottom:0}} barCategoryGap="20%" barGap={3}>
              <XAxis type="number" tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?(v/1000).toFixed(0)+"k":v}/>
              <YAxis type="category" dataKey="key" width={112} tick={{fill:C.muted,fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip content={<BarTT/>} cursor={{fill:"rgba(255,255,255,0.03)"}}/>
              <Bar dataKey="A" name={labelA} radius={[0,4,4,0]}
                label={{position:"right",fill:C.dim,fontSize:10,fontFamily:"monospace",formatter:v=>v>0?(v>=1000?(v/1000).toFixed(1)+"k":Math.round(v)):""}}>
                {chartData.map(entry=>(
                  <Cell key={entry.key+"A"} fill={colorOf(entry.key)} cursor="pointer" onClick={()=>handleClick(entry,"A")}/>
                ))}
              </Bar>
              {showB&&(
                <Bar dataKey="B" name={labelB} radius={[0,4,4,0]}
                  label={{position:"right",fill:"#a78bfa88",fontSize:10,fontFamily:"monospace",formatter:v=>v>0?(v>=1000?(v/1000).toFixed(1)+"k":Math.round(v)):""}}>
                  {chartData.map(entry=>(
                    <Cell key={entry.key+"B"} fill="#a78bfa" opacity={0.55} cursor="pointer" onClick={()=>handleClick(entry,"B")}/>
                  ))}
                </Bar>
              )}
            </BarChart>
          </ResponsiveContainer>
      }
      <div style={{fontSize:11,color:C.dim,marginTop:8,textAlign:"center"}}>Tap a bar to drill into its transactions</div>
    </div>
  );
}

// ─── Trend + Averages Chart ───────────────────────────────────────────────────
function TrendChart({transactions,taxonomy,currency}) {
  const [mode,setMode]             = useState("categories");
  const [chartType,setChartType]   = useState("trend");   // "trend" | "averages"
  const [gran,setGran]             = useState("month");
  const [avgGran,setAvgGran]       = useState("month");
  const [sel,setSel]               = useState([]);
  const [typeFilter,setTypeFilter] = useState(["standard","nonstandard","exceptional"]);

  // For compare mode
  const allMonths = useMemo(()=>[...new Set(transactions.map(t=>t.month))].sort(),[transactions]);
  const [cmpA,setCmpA] = useState(allMonths[Math.max(0,allMonths.length-2)]||"");
  const [cmpB,setCmpB] = useState(allMonths[allMonths.length-1]||"");

  // Date range for trend + averages
  const [preset,setPreset]     = useState("this_year");
  const [cfrom,setCfrom]       = useState("");
  const [cto,setCto]           = useState("");
  const {from,to} = useMemo(()=>resolvePeriod(preset,cfrom,cto),[preset,cfrom,cto]);

  const filtered = useMemo(()=>transactions.filter(t=>t.date>=from&&t.date<=to&&typeFilter.includes(t.txType)),[transactions,from,to,typeFilter]);

  const allSeries = useMemo(()=>{
    const s=new Set(filtered.map(t=>mode==="categories"?t.category:t.subcategory));
    return [...s].sort();
  },[filtered,mode]);

  const top5 = useMemo(()=>{
    const tots={};
    filtered.forEach(t=>{const k=mode==="categories"?t.category:t.subcategory; tots[k]=(tots[k]||0)+t.amount;});
    return Object.entries(tots).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>k);
  },[filtered,mode]);

  const active = sel.length?sel:top5;

  const colorOf = n => {
    if(mode==="categories") return taxonomy[n]?.color||PAL[allSeries.indexOf(n)%PAL.length];
    for(const[,d] of Object.entries(taxonomy)) if(d.subs[n]) return d.color;
    return PAL[allSeries.indexOf(n)%PAL.length];
  };

  const getBucket = (t,g) => g==="day"?t.date:g==="week"?weekKey(t.date):t.date?.substring(0,7)||"";
  const getLabel  = (k,g) => g==="month"?fmtM(k):g==="day"?fmtD(k):k;

  // ── Trend data ──
  const trendData = useMemo(()=>{
    const b={};
    filtered.forEach(t=>{
      const k=getBucket(t,gran); if(!k) return;
      if(!b[k])b[k]={_k:k};
      const sk=mode==="categories"?t.category:t.subcategory;
      b[k][sk]=(b[k][sk]||0)+t.amount;
    });
    return Object.values(b).sort((a,x)=>a._k.localeCompare(x._k)).map(r=>({...r,label:getLabel(r._k,gran)}));
  },[filtered,mode,gran]);

  // ── Averages data: for each selected series, avg spend per bucket ──
  const avgData = useMemo(()=>{
    if(chartType!=="averages") return [];
    const sk = mode==="categories"?"category":"subcategory";
    // Collect all buckets
    const buckets={};
    filtered.forEach(t=>{
      const bk=getBucket(t,avgGran); if(!bk) return;
      if(!buckets[bk]) buckets[bk]={};
      buckets[bk][t[sk]]=(buckets[bk][t[sk]]||0)+t.amount;
    });
    const allBuckets=Object.keys(buckets).sort();
    const nBuckets=allBuckets.length||1;
    // Build one row per series: { series, avg, total, count }
    return active.map(s=>{
      const total=allBuckets.reduce((sum,bk)=>sum+(buckets[bk]?.[s]||0),0);
      const nonZeroBuckets=allBuckets.filter(bk=>(buckets[bk]?.[s]||0)>0).length||1;
      return {key:s, avg:total/nonZeroBuckets, total};
    }).sort((a,b)=>b.avg-a.avg);
  },[filtered,chartType,mode,avgGran,active]);

  // ── Compare mode: two period lines ──
  const compareData = useMemo(()=>{
    if(chartType!=="compare") return [];
    const sk=mode==="categories"?"category":"subcategory";
    const txA=transactions.filter(t=>t.month===cmpA&&typeFilter.includes(t.txType));
    const txB=transactions.filter(t=>t.month===cmpB&&typeFilter.includes(t.txType));
    const days=[...new Set([...txA,...txB].map(t=>t.date.slice(8)))].sort();
    return days.map(d=>{
      const r={day:"D"+parseInt(d,10)};
      active.forEach(s=>{
        r[s+" ("+fmtM(cmpA)+")"] = txA.filter(t=>t.date.slice(8)===d&&t[sk]===s).reduce((a,t)=>a+t.amount,0)||null;
        r[s+" ("+fmtM(cmpB)+")"] = txB.filter(t=>t.date.slice(8)===d&&t[sk]===s).reduce((a,t)=>a+t.amount,0)||null;
      });
      return r;
    });
  },[chartType,transactions,cmpA,cmpB,active,mode,typeFilter]);

  const compareLines = useMemo(()=>{
    if(chartType!=="compare") return [];
    return active.flatMap(s=>[
      {key:s+" ("+fmtM(cmpA)+")", color:colorOf(s), dash:"6 3"},
      {key:s+" ("+fmtM(cmpB)+")", color:colorOf(s), dash:""},
    ]);
  },[chartType,active,cmpA,cmpB]);

  const DateRangeRow = () => (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
        {PERIOD_PRESETS.map(([v,l])=>(
          <button key={v} onClick={()=>setPreset(v)} style={{padding:"3px 9px",borderRadius:20,border:`1px solid ${preset===v?C.accent:C.border}`,background:preset===v?"rgba(184,245,118,0.1)":"transparent",color:preset===v?C.accent:C.dim,fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:preset===v?600:400}}>{l}</button>
        ))}
      </div>
      {preset==="custom"&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:10,color:C.dim}}>From</span>
            <input type="date" value={cfrom} onChange={e=>setCfrom(e.target.value)} style={{...inp({width:"auto",colorScheme:"dark"}),padding:"4px 8px",fontSize:10}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:10,color:C.dim}}>To</span>
            <input type="date" value={cto} onChange={e=>setCto(e.target.value)} style={{...inp({width:"auto",colorScheme:"dark"}),padding:"4px 8px",fontSize:10}}/>
          </div>
        </div>
      )}
      {preset!=="custom"&&<div style={{fontSize:10,color:C.dim,fontFamily:"monospace"}}>{from} → {to} · {filtered.length} txns</div>}
    </div>
  );

  return (
    <div style={card}>
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:17,marginBottom:10}}>Trends & Averages</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {[["trend","📈 Trend"],["averages","⌀ Averages"],["compare","⇄ Compare"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setChartType(v);setSel([]);}} style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${chartType===v?C.accent:C.border}`,background:chartType===v?"rgba(184,245,118,0.1)":"transparent",color:chartType===v?C.accent:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:chartType===v?700:400}}>{l}</button>
          ))}
        </div>
        <Pill options={[["categories","Categories"],["subcategories","Subcategories"]]} value={mode} onChange={v=>{setMode(v);setSel([]);}}/>
      </div>

      {/* Date range (trend + averages) */}
      {(chartType==="trend"||chartType==="averages")&&<DateRangeRow/>}

      {/* Granularity */}
      {chartType==="trend"&&(
        <div style={{marginBottom:12}}><Pill options={[["day","Day"],["week","Week"],["month","Month"]]} value={gran} onChange={setGran}/></div>
      )}
      {chartType==="averages"&&(
        <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,color:C.dim}}>Average per</span>
          <Pill options={[["week","Week"],["month","Month"]]} value={avgGran} onChange={setAvgGran}/>
        </div>
      )}

      {/* Compare period pickers */}
      {chartType==="compare"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:5,fontFamily:"monospace"}}>PERIOD A (dashed)</div>
            <select value={cmpA} onChange={e=>setCmpA(e.target.value)} style={{...inp(),appearance:"none",fontSize:12,padding:"6px 10px"}}>
              {allMonths.map(m=><option key={m} value={m}>{fmtM(m)}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:5,fontFamily:"monospace"}}>PERIOD B (solid)</div>
            <select value={cmpB} onChange={e=>setCmpB(e.target.value)} style={{...inp(),appearance:"none",fontSize:12,padding:"6px 10px"}}>
              {allMonths.map(m=><option key={m} value={m}>{fmtM(m)}</option>)}
            </select>
          </div>
        </div>
      )}

      {/* Type filter */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {Object.entries(TYPE_META).map(([v,m])=>(
          <button key={v} onClick={()=>setTypeFilter(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${typeFilter.includes(v)?m.color:C.border}`,background:typeFilter.includes(v)?m.color+"18":"transparent",color:typeFilter.includes(v)?m.color:C.dim,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:typeFilter.includes(v)?600:400}}>
            {typeFilter.includes(v)?"●":"○"} {m.full}
          </button>
        ))}
      </div>

      {/* Series selector (trend + compare) */}
      {(chartType==="trend"||chartType==="compare")&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
          {allSeries.map(name=>{
            const on=active.includes(name); const col=colorOf(name);
            return (
              <button key={name} onClick={()=>setSel(p=>p.includes(name)?p.filter(x=>x!==name):[...p,name])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${on?col:C.border}`,background:on?col+"22":"transparent",color:on?col:C.dim,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:on?600:400}}>
                {on?"●":"○"} {name}
              </button>
            );
          })}
          {sel.length>0&&<button onClick={()=>setSel([])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.dim,fontSize:11,cursor:"pointer"}}>Reset</button>}
        </div>
      )}

      {/* Series selector (averages — horizontal bars) */}
      {chartType==="averages"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
          {allSeries.map(name=>{
            const on=active.includes(name); const col=colorOf(name);
            return (
              <button key={name} onClick={()=>setSel(p=>p.includes(name)?p.filter(x=>x!==name):[...p,name])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${on?col:C.border}`,background:on?col+"22":"transparent",color:on?col:C.dim,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:on?600:400}}>
                {on?"●":"○"} {name}
              </button>
            );
          })}
          {sel.length>0&&<button onClick={()=>setSel([])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.dim,fontSize:11,cursor:"pointer"}}>Reset</button>}
        </div>
      )}

      {/* ── Trend chart ── */}
      {chartType==="trend"&&(
        trendData.length===0
          ? <div style={{padding:40,textAlign:"center",color:C.dim,fontSize:13}}>No data for this period</div>
          : <ResponsiveContainer width="100%" height={280}>
              <LineChart data={trendData} margin={{top:4,right:8,left:0,bottom:0}}>
                <XAxis dataKey="label" tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?(v/1000).toFixed(0)+"k":v}/>
                <Tooltip content={<TT/>}/>
                {active.map(n=>(
                  <Line key={n} type="monotone" dataKey={n} stroke={colorOf(n)} strokeWidth={2} dot={{fill:colorOf(n),r:3}} connectNulls activeDot={{r:5}}/>
                ))}
              </LineChart>
            </ResponsiveContainer>
      )}

      {/* ── Averages horizontal bar chart ── */}
      {chartType==="averages"&&(
        avgData.length===0
          ? <div style={{padding:40,textAlign:"center",color:C.dim,fontSize:13}}>No data for this period</div>
          : <>
              <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
                Average spend per {avgGran} · <span style={{fontFamily:"monospace",color:C.text}}>{from}</span> → <span style={{fontFamily:"monospace",color:C.text}}>{to}</span>
              </div>
              <ResponsiveContainer width="100%" height={Math.max(180, avgData.length*42+40)}>
                <BarChart data={avgData} layout="vertical" margin={{top:4,right:80,left:4,bottom:0}}>
                  <XAxis type="number" tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?(v/1000).toFixed(0)+"k":v}/>
                  <YAxis type="category" dataKey="key" width={112} tick={{fill:C.muted,fontSize:11}} axisLine={false} tickLine={false}/>
                  <Tooltip content={({active,payload,label})=>{
                    if(!active||!payload?.length) return null;
                    const col=colorOf(label);
                    const row=avgData.find(r=>r.key===label);
                    return (
                      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:12}}>
                        <div style={{fontWeight:700,color:col,marginBottom:5}}>{label}</div>
                        <div style={{color:C.muted,marginBottom:2}}>Avg / {avgGran}: <strong style={{color:C.text,fontFamily:"monospace"}}>{fmt(payload[0].value,currency)}</strong></div>
                        {row&&<div style={{color:C.dim,fontSize:11}}>Total: {fmt(row.total,currency)}</div>}
                      </div>
                    );
                  }} cursor={{fill:"rgba(255,255,255,0.03)"}}/>
                  <Bar dataKey="avg" radius={[0,4,4,0]}
                    label={{position:"right",fill:C.dim,fontSize:10,fontFamily:"monospace",formatter:v=>v>=1000?(v/1000).toFixed(1)+"k":Math.round(v)}}>
                    {avgData.map(entry=>(
                      <Cell key={entry.key} fill={colorOf(entry.key)}/>
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </>
      )}

      {/* ── Compare lines ── */}
      {chartType==="compare"&&(
        compareData.length===0
          ? <div style={{padding:40,textAlign:"center",color:C.dim,fontSize:13}}>No data to compare</div>
          : <>
              <div style={{fontSize:11,color:C.dim,marginBottom:8}}>
                Dashed = {fmtM(cmpA)} &nbsp;·&nbsp; Solid = {fmtM(cmpB)} &nbsp;·&nbsp; Same colour = same {mode==="categories"?"category":"subcategory"}
              </div>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={compareData} margin={{top:4,right:8,left:0,bottom:0}}>
                  <XAxis dataKey="day" tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fill:C.dim,fontSize:10,fontFamily:"monospace"}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?(v/1000).toFixed(0)+"k":v}/>
                  <Tooltip content={<TT/>}/>
                  {compareLines.map(l=>(
                    <Line key={l.key} type="monotone" dataKey={l.key} stroke={l.color} strokeWidth={2} strokeDasharray={l.dash} dot={false} connectNulls activeDot={{r:4}}/>
                  ))}
                </LineChart>
              </ResponsiveContainer>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>
                {active.map(n=>(
                  <div key={n} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}>
                    <div style={{width:16,height:2,background:colorOf(n),borderRadius:1}}/>
                    <span>{n}</span>
                  </div>
                ))}
              </div>
            </>
      )}
    </div>
  );
}

// ─── All Subcategories ────────────────────────────────────────────────────────
function AllSubs({transactions,taxonomy,currency,onDrill}) {
  const [sort,setSort]=useState("amount");
  const grand=transactions.reduce((s,t)=>s+t.amount,0);
  const rows=useMemo(()=>{
    const m={};
    transactions.forEach(t=>{
      const k=t.category+"||"+t.subcategory;
      if(!m[k])m[k]={category:t.category,subcategory:t.subcategory,amount:0,count:0};
      m[k].amount+=t.amount; m[k].count++;
    });
    const arr=Object.values(m);
    if(sort==="amount") arr.sort((a,b)=>b.amount-a.amount);
    else if(sort==="name") arr.sort((a,b)=>a.subcategory.localeCompare(b.subcategory));
    else arr.sort((a,b)=>a.category.localeCompare(b.category)||b.amount-a.amount);
    return arr;
  },[transactions,sort]);
  return (
    <div style={card}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,marginBottom:2}}>All Subcategories</div>
          <div style={{fontSize:12,color:C.muted}}>{rows.length} subcategories · {fmt(grand,currency)}</div>

        <Pill options={[["amount","Amount"],["cat","Category"],["name","A–Z"]]} value={sort} onChange={setSort}/>
      </div>

          const cd=taxonomy[r.category]||{icon:"📦",color:C.muted,subs:{}};

          const pct=grand>0?r.amount/grand*100:0;
          return (
            <div key={i} onClick={()=>onDrill&&onDrill(r.category,r.subcategory)} style={{padding:"11px 14px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.s2}`,cursor:"pointer"}}>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                  <div><span style={{fontSize:13,fontWeight:600}}>{r.subcategory}</span><span style={{fontSize:11,color:C.dim,marginLeft:8}}>{cd.icon} {r.category}</span></div>
                  <span style={{fontFamily:"monospace",fontSize:13,color:cd.color,marginLeft:8,flexShrink:0}}>{fmt(r.amount,currency)}</span>
                </div>
                <div style={{height:4,background:C.s2,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:cd.color,borderRadius:3}}/></div>
                <div style={{fontSize:11,color:C.dim,marginTop:3}}>{r.count} transaction{r.count!==1?"s":""} · {pct.toFixed(1)}%</div>
              </div>
              <span style={{color:C.dim,fontSize:18}}>›</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Drill-down ───────────────────────────────────────────────────────────────
function Drill({txs,cur,taxonomy,onRemap,initCat,initSub,onClearInit}) {
  const [cat,setCat]=useState(initCat||null);
  const [sub,setSub]=useState(initSub||null);
  useEffect(()=>{if(initCat){setCat(initCat);setSub(initSub||null);onClearInit&&onClearInit();}},[initCat,initSub]);

  if(sub&&cat) {
    const items=txs.filter(t=>t.category===cat&&t.subcategory===sub).sort((a,b)=>b.amount-a.amount);
    const cd=taxonomy[cat]||{icon:"📦",color:C.muted,subs:{}};
    const sd=cd.subs[sub]||{icon:"📦"};
    return (
      <div style={card}>
        <Crumb crumbs={[{label:"Categories",onClick:()=>{setCat(null);setSub(null);}},{label:cd.icon+" "+cat,onClick:()=>setSub(null)},{label:sd.icon+" "+sub}]}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><div style={{fontFamily:"Georgia,serif",fontSize:20}}>{sd.icon} {sub}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{items.length} transactions</div></div>
          <div style={{fontFamily:"Georgia,serif",fontSize:22,color:cd.color}}>{fmt(items.reduce((s,t)=>s+t.amount,0),cur)}</div>
        </div>
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
          {!items.length?<div style={{padding:28,textAlign:"center",color:C.dim,fontSize:13}}>No transactions</div>:items.map((tx,i)=>(
            <div key={i} style={{padding:"11px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.s2}`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.description}</div>
                <div style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>{tx.date}</div>
              </div>
              <TypeBadge txType={tx.txType} small/>
              <div style={{fontFamily:"monospace",fontSize:13,color:C.danger}}>−{fmt(tx.amount,cur)}</div>
              <button onClick={()=>onRemap(tx)} style={btn(C.s3,C.muted,`1px solid ${C.border}`,11,"4px 9px")}>✎</button>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if(cat) {
    const cd=taxonomy[cat]||{icon:"📦",color:C.muted,subs:{}};
    const cTxs=txs.filter(t=>t.category===cat);
    const cTot=cTxs.reduce((s,t)=>s+t.amount,0);
    const subTots={};
    cTxs.forEach(t=>{subTots[t.subcategory]=(subTots[t.subcategory]||0)+t.amount;});
    return (
      <div style={card}>
        <Crumb crumbs={[{label:"Categories",onClick:()=>setCat(null)},{label:cd.icon+" "+cat}]}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:20}}>{cd.icon} {cat}</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:22,color:cd.color}}>{fmt(cTot,cur)}</div>
        </div>
        {Object.entries(subTots).sort((a,b)=>b[1]-a[1]).map(([sn,val])=>{
          const pct=cTot>0?val/cTot*100:0;
          const sd=cd.subs[sn]||{icon:"📦"};
          const cnt=cTxs.filter(t=>t.subcategory===sn).length;
          return (
            <div key={sn} onClick={()=>setSub(sn)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.s2}`,cursor:"pointer"}}>
              <div style={{width:34,height:34,borderRadius:9,background:cd.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{sd.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:14,fontWeight:500}}>{sn}</span>
                  <span style={{fontFamily:"monospace",fontSize:13,color:cd.color}}>{fmt(val,cur)}</span>
                </div>
                <div style={{height:5,background:C.s2,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:cd.color,borderRadius:3,transition:"width 0.5s"}}/></div>
                <div style={{fontSize:11,color:C.dim,marginTop:3}}>{cnt} transaction{cnt!==1?"s":""} · {pct.toFixed(0)}%</div>
              </div>
              <span style={{color:C.dim,fontSize:18}}>›</span>
            </div>
          );
        })}
      </div>
    );
  }

  const tots={};
  txs.forEach(t=>{tots[t.category]=(tots[t.category]||0)+t.amount;});
  const grand=Object.values(tots).reduce((s,v)=>s+v,0);
  return (
    <div style={card}>
      <div style={{fontFamily:"Georgia,serif",fontSize:18,marginBottom:4}}>Spending by Category</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Tap a category to drill into subcategories and transactions</div>
      {Object.entries(tots).sort((a,b)=>b[1]-a[1]).map(([cn,val])=>{
        const cd=taxonomy[cn]||{icon:"📦",color:C.muted};
        const pct=grand>0?val/grand*100:0;
        const cnt=txs.filter(t=>t.category===cn).length;
        return (
          <div key={cn} onClick={()=>setCat(cn)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.s2}`,cursor:"pointer"}}>
            <div style={{width:38,height:38,borderRadius:11,background:cd.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cd.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:14,fontWeight:600}}>{cn}</span>
                <span style={{fontFamily:"monospace",fontSize:13,color:cd.color}}>{fmt(val,cur)}</span>
              </div>
              <div style={{height:5,background:C.s2,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:cd.color,borderRadius:3,transition:"width 0.5s"}}/></div>
              <div style={{fontSize:11,color:C.dim,marginTop:3}}>{cnt} transaction{cnt!==1?"s":""} · {pct.toFixed(0)}%</div>
            </div>
            <span style={{color:C.dim,fontSize:18}}>›</span>
          </div>
        );
      })}
    </div>
  );
}
