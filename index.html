// ─── Vendor View ─────────────────────────────────────────────────────────────
function VendorView({transactions, currency, pFrom, pTo}) {
  const today   = new Date();
  const ym      = d => d.toISOString().slice(0,7);
  const thisM   = ym(today);
  const prev    = new Date(today); prev.setMonth(prev.getMonth()-1);
  const lastM   = ym(prev);

  // All unique vendors sorted A-Z
  const allVendors = useMemo(()=>[...new Set(transactions.map(t=>t.description))].sort((a,b)=>a.localeCompare(b)),[transactions]);

  const [search,  setSearch]  = useState("");
  const [selected,setSelected]= useState(new Set());

  const filtered = useMemo(()=>allVendors.filter(v=>v.toLowerCase().includes(search.toLowerCase())),[allVendors,search]);

  function toggle(v){ setSelected(prev=>{ const s=new Set(prev); s.has(v)?s.delete(v):s.add(v); return s; }); }
  function selectAll(){ setSelected(new Set(filtered)); }
  function clearAll(){ setSelected(new Set()); }

  // Build per-vendor spend for 3 periods
  const vendorStats = useMemo(()=>{
    const yr = today.getFullYear()+"-";
    const stats={};
    transactions.forEach(t=>{
      if(!selected.has(t.description)) return;
      if(!stats[t.description]) stats[t.description]={period:0,thisMonth:0,lastMonth:0,last12:0};
      const m=t.date?.slice(0,7);
      if(t.date>=pFrom&&t.date<=pTo) stats[t.description].period+=t.amount;
      if(m===thisM) stats[t.description].thisMonth+=t.amount;
      if(m===lastM) stats[t.description].lastMonth+=t.amount;
      if(t.date>=yr+"01-01") stats[t.description].last12+=t.amount;
    });
    return Object.entries(stats)
      .map(([v,s])=>({vendor:v,...s}))
      .sort((a,b)=>b.last12-a.last12);
  },[transactions,selected,thisM,lastM,pFrom,pTo]);

  const totals = useMemo(()=>vendorStats.reduce((acc,r)=>({
    period:acc.period+r.period,
    thisMonth:acc.thisMonth+r.thisMonth,
    lastMonth:acc.lastMonth+r.lastMonth,
    last12:acc.last12+r.last12
  }),{period:0,thisMonth:0,lastMonth:0,last12:0}),[vendorStats]);

  const fmtM = m=>{ const [y,mo]=m.split("-"); return new Date(+y,+mo-1,1).toLocaleString("default",{month:"short",year:"2-digit"}); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Vendor selector */}
      <div style={{...card,padding:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:17}}>Select Vendors</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={selectAll} style={btn(C.s2,C.muted,`1px solid ${C.border}`,11,"5px 10px")}>All visible</button>
            <button onClick={clearAll}  style={btn(C.s2,C.muted,`1px solid ${C.border}`,11,"5px 10px")}>Clear</button>
          </div>
        </div>
        <input
          value={search}
          onChange={e=>setSearch(e.target.value)}
          placeholder="Search vendors…"
          style={{...inp(),width:"100%",marginBottom:10,boxSizing:"border-box",fontSize:13}}
        />
        <div style={{maxHeight:220,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:10,background:C.bg}}>
          {filtered.length===0&&<div style={{padding:16,textAlign:"center",color:C.dim,fontSize:13}}>No vendors found</div>}
          {filtered.map(v=>{
            const on=selected.has(v);
            return (
              <div key={v} onClick={()=>toggle(v)} style={{padding:"9px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.s2}`,cursor:"pointer",background:on?"rgba(184,245,118,0.05)":"transparent"}}>
                <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${on?C.accent:C.border}`,background:on?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0d0f0e",fontWeight:700,flexShrink:0}}>{on?"✓":""}</div>
                <span style={{fontSize:13,color:on?C.text:C.muted,flex:1}}>{v}</span>
                <span style={{fontSize:11,color:C.dim,fontFamily:"monospace"}}>{fmt(transactions.filter(t=>t.description===v).reduce((s,t)=>s+t.amount,0),currency)}</span>
              </div>
            );
          })}
        </div>
        <div style={{fontSize:12,color:C.dim,marginTop:8}}>{selected.size} vendor{selected.size!==1?"s":""} selected · {allVendors.length} total</div>
      </div>

      {/* Spending table */}
      {selected.size>0&&(
        <div style={{...card,padding:18,overflowX:"auto"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,marginBottom:14}}>Spending by Vendor</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr>
                <th style={{textAlign:"left",padding:"6px 10px",color:C.dim,fontWeight:500,fontSize:11,fontFamily:"monospace",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>Vendor</th>
                <th style={{textAlign:"right",padding:"6px 10px",color:C.accent,fontWeight:600,fontSize:11,fontFamily:"monospace",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>Selected</th>
                <th style={{textAlign:"right",padding:"6px 10px",color:C.dim,fontWeight:500,fontSize:11,fontFamily:"monospace",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{fmtM(thisM)}</th>
                <th style={{textAlign:"right",padding:"6px 10px",color:C.dim,fontWeight:500,fontSize:11,fontFamily:"monospace",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{fmtM(lastM)}</th>
                <th style={{textAlign:"right",padding:"6px 10px",color:C.dim,fontWeight:500,fontSize:11,fontFamily:"monospace",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>Last 12M</th>
              </tr>
            </thead>
            <tbody>
              {vendorStats.map((r,i)=>(
                <tr key={r.vendor} style={{background:i%2===0?"transparent":C.s2+"44"}}>
                  <td style={{padding:"9px 10px",color:C.text,fontWeight:500}}>{r.vendor}</td>
                  <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",color:r.period?C.accent:C.dim,fontWeight:r.period?600:400}}>{r.period?fmt(r.period,currency):"—"}</td>
                  <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",color:r.thisMonth?C.danger:C.dim}}>{r.thisMonth?fmt(r.thisMonth,currency):"—"}</td>
                  <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",color:r.lastMonth?C.danger:C.dim}}>{r.lastMonth?fmt(r.lastMonth,currency):"—"}</td>
                  <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",color:r.last12?C.danger:C.dim}}>{r.last12?fmt(r.last12,currency):"—"}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{borderTop:`2px solid ${C.border}`}}>
                <td style={{padding:"9px 10px",fontWeight:700,color:C.text}}>Total</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmt(totals.period,currency)}</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmt(totals.thisMonth,currency)}</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmt(totals.lastMonth,currency)}</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:C.accent}}>{fmt(totals.last12,currency)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      {selected.size===0&&(
        <div style={{...card,padding:32,textAlign:"center",color:C.dim,fontSize:13}}>
          Select vendors above to see their spending breakdown
        </div>
      )}
    </div>
  );
}


function App() {
  const [taxonomy,   setTaxonomyRaw]  = useState(DEFAULT_TAXONOMY);
  const [vendorMap,  setVendorMapRaw] = useState({});
  const [rawTxs,     setRawTxsRaw]    = useState(RAW_SEED);
  const [period,     setPeriod]       = useState({preset:"this_month",from:"",to:""});
  const [tab,        setTab]          = useState("overview");
  const [txFilter,   setTxFilter]     = useState("all");
  const [txSort,     setTxSort]       = useState("amount");
  const [currency,   setCurrency]     = useState("AED");
  const [modal,      setModal]        = useState(null);
  const [remapTx,    setRemapTx]      = useState(null);
  const [loaded,     setLoaded]       = useState(false);
  const [drillCat,   setDrillCat]     = useState(null);
  const [drillSub,   setDrillSub]     = useState(null);
  const [selTxs,     setSelTxs]       = useState(new Set());
  const [drillOverlay, setDrillOverlay] = useState(null);

  const setTaxonomy  = v=>{const n=typeof v==="function"?v(taxonomy):v; setTaxonomyRaw(n); storeSave("ledger-taxonomy",n);};
  const setVendorMap = v=>{const n=typeof v==="function"?v(vendorMap):v; setVendorMapRaw(n); storeSave("ledger-vendormap",n);};
  const setRawTxs    = v=>{const n=typeof v==="function"?v(rawTxs):v; setRawTxsRaw(n); storeSave("ledger-rawtxs",n);};

  useEffect(()=>{
    const tax=storeLoad("ledger-taxonomy");
    const vmap=storeLoad("ledger-vendormap");
    const txs=storeLoad("ledger-rawtxs");
    const cur=storeLoad("ledger-currency");
    if(tax) setTaxonomyRaw(tax);
    if(vmap) setVendorMapRaw(vmap);
    if(txs&&txs.length) setRawTxsRaw(txs);
    if(cur) setCurrency(cur);
    setLoaded(true);
  },[]);
  useEffect(()=>{if(loaded) storeSave("ledger-currency",currency);},[currency,loaded]);

  const transactions=useMemo(()=>rawTxs.map(tx=>enrich(tx,taxonomy,vendorMap)),[rawTxs,taxonomy,vendorMap]);
  const months=[...new Set(transactions.map(t=>t.month))].sort();
  const {from:pFrom,to:pTo}=useMemo(()=>resolvePeriod(period.preset,period.from,period.to),[period]);
  const mTxs=useMemo(()=>transactions.filter(t=>t.date>=pFrom&&t.date<=pTo),[transactions,pFrom,pTo]);
  const total=mTxs.reduce((s,t)=>s+t.amount,0);
  // Compare vs previous equivalent window
  const windowDays=Math.max(1,Math.round((new Date(pTo)-new Date(pFrom))/(1000*60*60*24)));
  const prevTo=new Date(pFrom); prevTo.setDate(prevTo.getDate()-1);
  const prevFrom=new Date(prevTo); prevFrom.setDate(prevFrom.getDate()-(windowDays-1));
  const toISO=d=>d.toISOString().slice(0,10);
  const prevTotal=transactions.filter(t=>t.date>=toISO(prevFrom)&&t.date<=toISO(prevTo)).reduce((s,t)=>s+t.amount,0);
  const change=prevTotal?((total-prevTotal)/prevTotal*100).toFixed(1):null;

  const typeTots=useMemo(()=>{
    const r={standard:0,nonstandard:0,exceptional:0};
    mTxs.forEach(t=>{r[t.txType]=(r[t.txType]||0)+t.amount;});
    return r;
  },[mTxs]);

  const allCats=[...new Set(transactions.map(t=>t.category))];

  function handleRemap(cat,sub,txType,scope) {
    const k=(remapTx.description||"").toLowerCase().trim();
    if(scope==="vendor") {
      setVendorMap(v=>({...v,[k]:{category:cat,subcategory:sub,txType}}));
      setRawTxs(prev=>prev.map(t=>(t.description||"").toLowerCase().trim()===k?{...t,category:cat,subcategory:sub,txType}:t));
    } else {
      setRawTxs(prev=>prev.map(t=>t.date===remapTx.date&&t.description===remapTx.description&&t.amount===remapTx.amount?{...t,category:cat,subcategory:sub,txType}:t));
    }
    setModal(null); setRemapTx(null);
  }

  function handleBulkSave(cat,sub,txType,selected) {
    setRawTxs(prev=>prev.map(t=>{
      const key=t.date+"||"+t.description+"||"+t.amount;
      if(!selected.has(key)) return t;
      return {...t,...(cat?{category:cat}:{}), ...(sub?{subcategory:sub}:{}), ...(txType?{txType}:{})};
    }));
    setSelTxs(new Set()); setModal(null);
  }

  function handleImport(parsed) {
    const e=parsed.map(tx=>({...tx,amount:Math.abs(parseFloat(tx.amount))||0,txType:tx.txType||getTxType(tx)})).filter(t=>t.amount>0);
    setRawTxs(prev=>[...prev,...e].filter((tx,i,a)=>a.findIndex(t=>t.date===tx.date&&t.description===tx.description&&t.amount===tx.amount)===i));
    const nm=[...new Set([...rawTxs,...e].map(t=>(t.date||"").substring(0,7)))].filter(Boolean).sort();
    if(nm.length) setSelMonth(nm[nm.length-1]);
    setModal(null);
  }

  function handleSettingsImport(p) {
    if(p.taxonomy){setTaxonomyRaw(p.taxonomy);storeSave("ledger-taxonomy",p.taxonomy);}
    if(p.vendorMap){setVendorMapRaw(p.vendorMap);storeSave("ledger-vendormap",p.vendorMap);}
    if(p.rawTxs){setRawTxsRaw(p.rawTxs);storeSave("ledger-rawtxs",p.rawTxs);}
    if(p.currency){setCurrency(p.currency);storeSave("ledger-currency",p.currency);}
  }

  function cycleTxType(tx) {
    const order=["standard","nonstandard","exceptional"];
    const next=order[(order.indexOf(tx.txType||"standard")+1)%3];
    setRawTxs(prev=>prev.map(t=>t.date===tx.date&&t.description===tx.description&&t.amount===tx.amount?{...t,txType:next}:t));
  }

  function toggleSelTx(tx) {
    const key=tx.date+"||"+tx.description+"||"+tx.amount;
    setSelTxs(prev=>{const n=new Set(prev); n.has(key)?n.delete(key):n.add(key); return n;});
  }

  const filteredTxs=useMemo(()=>{
    const base=txFilter==="standard"?mTxs.filter(t=>t.txType==="standard"):txFilter==="nonstandard"?mTxs.filter(t=>t.txType==="nonstandard"):txFilter==="exceptional"?mTxs.filter(t=>t.txType==="exceptional"):mTxs;
    const sorted=[...base];
    if(txSort==="amount") sorted.sort((a,b)=>b.amount-a.amount);
    else if(txSort==="subcategory") sorted.sort((a,b)=>(a.subcategory||"").localeCompare(b.subcategory||"")||(a.category||"").localeCompare(b.category||"")||b.amount-a.amount);
    else if(txSort==="description") sorted.sort((a,b)=>(a.description||"").localeCompare(b.description||"")||b.amount-a.amount);
    else sorted.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    return sorted;
  },[mTxs,txFilter,txSort]);

  const TABS=[["overview","📊"],["categories","🗂"],["subcategories","🔖"],["trend","📈"],["transactions","📋"],["vendors","🏪"]];
  const TAB_LABELS={overview:"Overview",categories:"Categories",subcategories:"Subcategories",trend:"Trends",transactions:"Transactions",vendors:"Vendors"};

  if(!loaded) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:14}}>Loading…</div>;

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",paddingBottom:90}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;}select,input,textarea,button{font-family:inherit;}`}</style>

      {modal==="import"   && <ImportModal onImport={handleImport} onClose={()=>setModal(null)}/>}
      {modal==="manage"   && <ManageModal taxonomy={taxonomy} setTaxonomy={setTaxonomy} vendorMap={vendorMap} setVendorMap={setVendorMap} onClose={()=>setModal(null)}/>}
      {modal==="remap"    && remapTx && <RemapModal tx={remapTx} taxonomy={taxonomy} onSave={handleRemap} onClose={()=>{setModal(null);setRemapTx(null);}}/>}
      {modal==="export"   && <ExportModal transactions={transactions} taxonomy={taxonomy} currency={currency} onClose={()=>setModal(null)}/>}
      {modal==="settings" && <SettingsModal taxonomy={taxonomy} vendorMap={vendorMap} rawTxs={rawTxs} currency={currency} onImport={handleSettingsImport} onClose={()=>setModal(null)}/>}

      {modal==="bulk"     && <BulkEditModal selected={selTxs} transactions={mTxs} taxonomy={taxonomy} onSave={handleBulkSave} onClose={()=>setModal(null)}/>}
      {drillOverlay       && <DrillTxOverlay txs={drillOverlay.txs} label={drillOverlay.label} currency={currency} taxonomy={taxonomy} onRemap={tx=>{setRemapTx(tx);setDrillOverlay(null);setModal("remap");}} onClose={()=>setDrillOverlay(null)}/>}

      {/* Header */}
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:"rgba(13,15,14,0.95)",backdropFilter:"blur(20px)",zIndex:100}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:22,color:C.accent}}>Ledger<span style={{color:C.dim,fontStyle:"italic"}}>.</span></div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select value={currency} onChange={e=>setCurrency(e.target.value)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"6px 10px",fontSize:12,fontFamily:"monospace",outline:"none"}}>
            {["AED","GBP","USD","EUR","SAR","INR"].map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={()=>setModal("settings")} style={btn(C.s2,C.muted,`1px solid ${C.border}`,12,"8px 10px")}>💾 Save / Load</button>
          <button onClick={()=>setModal("export")} style={btn(C.s2,C.muted,`1px solid ${C.border}`,12,"8px 10px")}>⬇ Excel</button>
          <button onClick={()=>setModal("manage")} style={btn(C.s2,C.muted,`1px solid ${C.border}`,12,"8px 10px")}>⚙ Cats</button>
          <button onClick={()=>setModal("import")} style={btn(C.accent,"#0d0f0e","none",12,"8px 12px")}>+ Add</button>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>

        {/* Period picker */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:period.preset==="custom"?10:0}}>
            {[["this_week","This Week"],["last_week","Last Week"],["this_month","This Month"],["last_month","Last Month"],["this_year","This Year"],["last_year","Last Year"],["custom","Custom"]].map(([v,l])=>(
              <button key={v} onClick={()=>setPeriod(p=>({...p,preset:v}))} style={{padding:"6px 13px",borderRadius:20,border:`1px solid ${period.preset===v?C.accent:C.border}`,background:period.preset===v?C.accent:"transparent",color:period.preset===v?"#0d0f0e":C.muted,fontSize:12,fontFamily:"monospace",cursor:"pointer",fontWeight:period.preset===v?700:400,outline:"none"}}>
                {l}
              </button>
            ))}
          </div>
          {period.preset==="custom"&&(
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginTop:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:C.dim}}>From</span>
                <input type="date" value={period.from} onChange={e=>setPeriod(p=>({...p,from:e.target.value}))} style={{...inp(),colorScheme:"dark",fontSize:12,fontFamily:"monospace",cursor:"pointer",minWidth:140}}/>
              </div>
              <span style={{color:C.dim}}>→</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:C.dim}}>To</span>
                <input type="date" value={period.to} onChange={e=>setPeriod(p=>({...p,to:e.target.value}))} style={{...inp(),colorScheme:"dark",fontSize:12,fontFamily:"monospace",cursor:"pointer",minWidth:140}}/>
              </div>
            </div>
          )}
          <div style={{fontSize:11,color:C.dim,fontFamily:"monospace",marginTop:6}}>{pFrom} → {pTo} · {mTxs.length} transactions</div>
        </div>

        {/* Summary cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:18}}>
          {[
            {label:"Total",value:fmt(total,currency),sub:pFrom===pTo?pFrom:pFrom.slice(0,7)!==pTo.slice(0,7)?pFrom+" → "+pTo:fmtM(pFrom.slice(0,7)),delta:change,accent:C.accent},
            {label:"★ Standard",value:fmt(typeTots.standard,currency),sub:mTxs.filter(t=>t.txType==="standard").length+" txns",accent:"#76f5d4"},
            {label:"◆ Non-Standard",value:fmt(typeTots.nonstandard||0,currency),sub:mTxs.filter(t=>t.txType==="nonstandard").length+" txns",accent:"#a78bfa"},
            {label:"⚡ Exceptional",value:fmt(typeTots.exceptional||0,currency),sub:mTxs.filter(t=>t.txType==="exceptional").length+" txns",accent:"#f5d476"},
          ].map((c,i)=>(
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:c.accent}}/>
              <div style={{fontFamily:"monospace",fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{c.label}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:19,letterSpacing:-0.5,marginBottom:4,lineHeight:1.2}}>{c.value}</div>
              <div style={{fontSize:12,color:C.muted}}>{c.sub}</div>
              {c.delta!=null&&<div style={{marginTop:7,display:"inline-block",padding:"2px 7px",borderRadius:6,fontSize:11,fontFamily:"monospace",background:c.delta>0?"rgba(245,118,118,0.15)":"rgba(184,245,118,0.15)",color:c.delta>0?C.danger:C.accent}}>{c.delta>0?"▲":"▼"} {Math.abs(c.delta)}% vs prev</div>}
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:2,background:C.surface,padding:4,borderRadius:12,marginBottom:18,border:`1px solid ${C.border}`}}>
          {TABS.map(([t,icon])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",background:tab===t?C.s3:"transparent",color:tab===t?C.text:C.dim,cursor:"pointer",fontFamily:"inherit",fontWeight:tab===t?600:400,outline:"none",textAlign:"center",lineHeight:1.2}}>
              <div style={{fontSize:16}}>{icon}</div>
              <div style={{fontSize:10,marginTop:2}}>{TAB_LABELS[t]}</div>
            </button>
          ))}
        </div>

        {/* ── Overview ── */}
        {tab==="overview" && (
          <SpendingChart
            transactions={transactions}
            taxonomy={taxonomy}
            currency={currency}
            onDrillTxs={(txs,label)=>setDrillOverlay({txs,label})}
          />
        )}

        {tab==="categories" && (
          <Drill txs={mTxs} cur={currency} taxonomy={taxonomy}
            onRemap={tx=>{setRemapTx(tx);setModal("remap");}}
            initCat={drillCat} initSub={drillSub}
            onClearInit={()=>{setDrillCat(null);setDrillSub(null);}}
          />
        )}

        {tab==="subcategories" && (
          <AllSubs transactions={mTxs} taxonomy={taxonomy} currency={currency}
            onDrill={(c,s)=>{setDrillCat(c);setDrillSub(s);setTab("categories");}}
          />
        )}

        {tab==="trend" && <TrendChart transactions={transactions} taxonomy={taxonomy} currency={currency}/>}
        {tab==="vendors" && <VendorView transactions={transactions} currency={currency} pFrom={pFrom} pTo={pTo}/>}

        {tab==="transactions" && (
          <div style={card}>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <Pill options={[["all","All"],["standard","★"],["nonstandard","◆"],["exceptional","⚡"]]} value={txFilter} onChange={setTxFilter}/>
              <Pill options={[["amount","Value ↓"],["subcategory","A–Z Sub"],["description","A–Z Desc"],["date","Date ↓"]]} value={txSort} onChange={setTxSort}/>
              <span style={{marginLeft:"auto",fontFamily:"monospace",fontSize:12,color:C.dim}}>{filteredTxs.length} · {fmt(filteredTxs.reduce((s,t)=>s+t.amount,0),currency)}</span>
            </div>
            {selTxs.size>0&&(
              <div style={{display:"flex",gap:10,marginBottom:12,padding:"10px 14px",background:C.s2,borderRadius:10,alignItems:"center"}}>
                <span style={{fontSize:13,color:C.accent,fontWeight:600}}>{selTxs.size} selected</span>
                <button onClick={()=>setModal("bulk")} style={btn(C.accent,"#0d0f0e","none",12,"6px 14px")}>✎ Edit Selected</button>
                <button onClick={()=>setSelTxs(new Set())} style={btn(C.s3,C.muted,`1px solid ${C.border}`,12,"6px 12px")}>Clear</button>
              </div>
            )}
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
              {!filteredTxs.length?<div style={{padding:28,textAlign:"center",color:C.dim,fontSize:13}}>No transactions</div>:filteredTxs.map((tx,i)=>{
                const key=tx.date+"||"+tx.description+"||"+tx.amount;
                const isSel=selTxs.has(key);
                return (
                  <div key={i} onClick={()=>toggleSelTx(tx)} style={{padding:"11px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.s2}`,background:isSel?"rgba(184,245,118,0.06)":"transparent",cursor:"pointer"}}>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${isSel?C.accent:C.border}`,background:isSel?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:"#0d0f0e",fontWeight:700}}>
                      {isSel?"✓":""}
                    </div>
                    <div style={{width:30,height:30,borderRadius:8,background:(taxonomy[tx.category]?.color||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>
                      {taxonomy[tx.category]?.subs[tx.subcategory]?.icon||taxonomy[tx.category]?.icon||"📦"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.description}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>{tx.date?.substring(5)} · {tx.category} › {tx.subcategory}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                      <TypeBadge txType={tx.txType} onClick={()=>cycleTxType(tx)} small/>
                      <div style={{fontFamily:"monospace",fontSize:13,color:C.danger}}>−{fmt(tx.amount,currency)}</div>
                      <button onClick={e=>{e.stopPropagation();setRemapTx(tx);setModal("remap");}} style={btn(C.s3,C.muted,`1px solid ${C.border}`,11,"4px 9px")}>✎</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>


    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
